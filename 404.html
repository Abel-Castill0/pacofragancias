<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0a06" />
  <meta name="robots" content="noindex, follow" />
  <title>404 · Página no encontrada · Paco Fragancias</title>
  <link rel="icon" type="image/webp" href="logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .nf-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 2.5rem 1.5rem; gap: .4rem;
    }
    .nf-logo { width: 64px; height: 64px; margin-bottom: 1.4rem; }
    .nf-code {
      font-family: var(--font-display); font-weight: 500;
      font-size: clamp(5rem, 18vw, 9rem); line-height: .9;
      color: var(--gold); letter-spacing: .02em;
      text-shadow: 0 6px 30px var(--gold-glow);
    }
    .nf-title {
      font-family: var(--font-display); font-weight: 500;
      font-size: clamp(1.5rem, 4vw, 2.2rem); color: var(--text-primary);
      margin-top: .4rem;
    }
    .nf-text {
      color: var(--text-muted); font-size: .98rem; max-width: 440px;
      line-height: 1.7; margin: .7rem 0 2rem;
    }
    .nf-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .nf-divider {
      width: 56px; height: 2px; margin: 1.2rem auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
  </style>
</head>
<body>
  <main class="nf-wrap">
    <img src="logo.webp" alt="Paco Fragancias" class="nf-logo" width="64" height="64" decoding="async" />
    <div class="nf-code">404</div>
    <h1 class="nf-title">Página no encontrada</h1>
    <p class="nf-text">
      La fragancia que buscas parece haberse evaporado. Puede que el enlace
      esté roto o que la página ya no exista.
    </p>
    <div class="nf-actions">
      <a class="btn btn-gold" href="index.html">
        <span>Ir a Inicio</span>
      </a>
      <a class="btn btn-ghost" href="index.html#catalogo">
        <span>Ver Catálogo</span>
      </a>
    </div>
    <div class="nf-divider" aria-hidden="true"></div>
  </main>
</body>
</html>
