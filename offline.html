<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0a06" />
  <meta name="robots" content="noindex" />
  <title>Sin conexión · Paco Fragancias</title>
  <link rel="icon" type="image/webp" href="logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .off-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 2.5rem 1.5rem; gap: .3rem;
    }
    .off-logo { width: 76px; height: 76px; margin-bottom: 1.6rem; filter: drop-shadow(0 8px 24px rgba(184,146,74,.3)); }
    .off-title {
      font-family: var(--font-display); font-weight: 500;
      font-size: clamp(1.8rem, 6vw, 2.6rem); color: var(--text-primary); margin-bottom: .5rem;
    }
    .off-text { color: var(--text-muted); font-size: 1rem; max-width: 380px; line-height: 1.7; margin-bottom: 2rem; }
    .off-divider { width: 56px; height: 2px; margin: 1.4rem auto 0; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  </style>
</head>
<body>
  <main class="off-wrap">
    <img src="logo.webp" alt="Paco Fragancias" class="off-logo" width="76" height="76" decoding="async" />
    <h1 class="off-title">Estás sin conexión</h1>
    <p class="off-text">
      No pudimos cargar la página. Revisa tu conexión a internet e inténtalo de
      nuevo — tu carrito sigue guardado.
    </p>
    <button class="btn btn-gold" onclick="location.reload()">
      <span>Reintentar</span>
    </button>
    <div class="off-divider" aria-hidden="true"></div>
  </main>
</body>
</html>
